<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em Html</title>
</head>
<body>

    <table border="1"><!--Tabela-->
        <caption>
            Lista de pessoas
        </caption>
        <thead><!--Cabeçalho da tabela-->
            <tr><!--Linha do cabeçalho-->
                <th>Nome</th><!---->
                <th>Idade</th><!--Coluna do cabeçalho-->
                <th>Cidade</th><!---->
            </tr>
        </thead>
        <tbody><!--Corpo da tabela-->
            <tr>
                <td>David</td><!--Coluna 1 do corpo-->
                <td>23</td>
                <td>São Paulo</td>
            </tr>

            <tr><!--Nova linha do corpo-->
                <td>Jefferson</td><!--Coluna 2 do corpo-->
                <td>28</td>
                <td>São Paulo</td>
            </tr>

            <tr><!--Nova linha do corpo-->
                <td>Jhonata</td><!--Coluna 3 do corpo-->
                <td>16</td>
                <td>São Paulo</td>
            </tr>

            <tr><!--Nova linha do corpo-->
                <td>Thiago</td><!--Coluna 4 do corpo-->
                <td>16</td>
                <td>São Paulo</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <!--Célula que ocupa todas as colunas-->
                <td colspan="4">Total de pessoas</td>
                <td>4</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
